<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学習履歴 | QualiStudy</title>
  <link rel="stylesheet" href="study-history.css" />
  <link rel="icon" type="image/png" href="exam_icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <main class="history-shell">
    <header class="history-header">
      <div>
        <a href="index.html" class="brand">QualiStudy</a>
        <p id="exam-name" class="exam-name">学習履歴</p>
      </div>

      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        トップへ戻る
      </a>
    </header>

    <section class="history-panel">
      <div class="panel-heading">
        <h1>学習履歴</h1>
        <span id="history-count" class="history-count">読み込み中</span>
      </div>

      <section class="practice-tools" aria-label="復習メニュー">
        <div class="practice-tool practice-tool-unanswered">
          <div class="practice-tool-copy">
            <h2>未回答の問題に取り組む</h2>
            <p>選択した期間内に解いていない問題を出題します。</p>
          </div>

          <div class="unanswered-actions">
            <div id="unanswered-period-tabs" class="period-tabs" role="group" aria-label="未回答とみなす期間">
              <button type="button" class="period-tab" data-period-days="1">1日</button>
              <button type="button" class="period-tab" data-period-days="3">3日</button>
              <button type="button" class="period-tab active" data-period-days="7">7日</button>
              <button type="button" class="period-tab" data-period-days="14">2週間</button>
              <button type="button" class="period-tab" data-period-days="30">1か月</button>
              <button type="button" class="period-tab" data-period-days="90">3か月</button>
              <button type="button" class="period-tab" data-period-days="all">全期間</button>
            </div>

            <button id="start-unanswered-btn" type="button" class="practice-start-btn">
              <i class="fa-solid fa-clock-rotate-left"></i>
              この期間に未回答の問題を解く
            </button>
          </div>
        </div>

        <div class="practice-tool">
          <div class="practice-tool-copy">
            <h2>間違えた問題を復習する</h2>
            <p>過去に一度でも間違えた問題だけを出題します。</p>
          </div>

          <button id="start-incorrect-btn" type="button" class="practice-start-btn practice-start-btn-secondary">
            <i class="fa-solid fa-rotate-right"></i>
            間違えた問題だけを解く
          </button>
        </div>
      </section>

      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script>
    fetch('supabase-config.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('supabase-config.json が見つかりません');
        }
        return response.json();
      })
      .then(config => {
        window.SUPABASE_CONFIG = config.supabase;
        const script = document.createElement('script');
        script.src = 'study-history.js';
        document.body.appendChild(script);
      })
      .catch(error => {
        console.error('Supabase設定エラー:', error);
        alert('Supabase設定の読み込みに失敗しました。トップへ戻ります。');
        window.location.replace('index.html');
      });
  </script>
</body>

</html>
