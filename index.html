<!DOCTYPE html>
<html lang="ja">

<head>

  <!-- 文字コード -->
  <meta charset="UTF-8" />

  <!-- スマホ対応 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- タイトル -->
  <title>QualiStudy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" type="image/png" href="exam_icon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

  <div class="app-shell">

    <!-- ========================= -->
    <!-- サイドバー -->
    <!-- ========================= -->

    <aside class="sidebar">

    <!-- ロゴ -->
    <a href="index.html" class="logo-link">

      <div class="logo">

        <i class="fa-solid fa-graduation-cap"></i>

        <span>QualiStudy</span>

      </div>

    </a>

    <!-- メニュー -->
    <div class="menu">

      <p class="menu-title">
        資格一覧
      </p>

      <!-- HTML5 -->
      <button class="exam-card active">

        <i class="fa-solid fa-code"></i>

        <div>
          <h3>HTML5 L1</h3>
          <p>HTML5 Professional Level1</p>
        </div>

      </button>

      <!-- UML -->
      <button class="exam-card">

        <i class="fa-solid fa-diagram-project"></i>

        <div>
          <h3>UML L2</h3>
          <p>UMLモデリング技能認定 L2</p>
        </div>

      </button>

      <!-- AWS SAA -->
      <button class="exam-card">

        <i class="fa-solid fa-cloud"></i>

        <div>
          <h3>AWS SAA</h3>
          <p>AWS Certified Solutions Architect - Associate</p>
        </div>

      </button>

      <!-- JCSQE -->
      <button class="exam-card">

        <i class="fa-solid fa-book"></i>

        <div>
          <h3>JCSQE 初級</h3>
          <p>ソフトウェア品質管理の基礎</p>
        </div>

      </button>

    </div>

  </aside>

    <!-- ========================= -->
    <!-- メイン -->
    <!-- ========================= -->

    <main class="main-content">

    <!-- 上部 -->
    <header class="topbar">

      <button class="login-btn">

        <i class="fa-regular fa-user"></i>

        ログイン（後で実装）

      </button>

    </header>

    <!-- メインカード -->
    <section class="hero-card">

      <!-- 左 -->
      <div class="hero-left">

        <span class="badge">
          選択中の資格
        </span>

        <h1 id="exam-title">
          HTML5 Professional Level1
        </h1>

        <p id="exam-description">
          HTML5/CSS/JavaScriptの基礎を問うWeb資格。
          マークアップ、スタイリング、アクセシビリティなどが出題されます。
        </p>

        <!-- ボタン -->
        <div class="hero-buttons">

          <!-- 学習開始 -->
          <button type="button" class="start-btn">

            <i class="fa-solid fa-play"></i>

            学習を開始する

          </button>

          <!-- 問題追加 -->
          <button type="button" class="import-btn">

            <i class="fa-solid fa-file-import"></i>

            問題を追加

          </button>

          <!-- 問題編集 -->
          <button type="button" class="edit-btn">

            <i class="fa-solid fa-pen-to-square"></i>

            問題を編集

          </button>

          <button type="button" class="schedule-btn">

            <i class="fa-regular fa-calendar-days"></i>

            試験スケジュール

          </button>

        </div>

      </div>

      <!-- 右 -->
      <div class="hero-right">

        <i class="fa-solid fa-cloud hero-icon"></i>

      </div>

    </section>

    <!-- ステータス -->
    <section class="stats">

      <!-- 問題数 -->
      <div class="stat-card">

        <i class="fa-regular fa-file-lines"></i>

        <div>
          <p>問題数</p>
          <h2 id="stat-questions">320問</h2>
        </div>

      </div>

      <!-- 正答率 -->
      <div class="stat-card">

        <i class="fa-solid fa-bullseye"></i>

        <div>
          <p>正答率</p>
          <h2 id="stat-accuracy">78%</h2>
        </div>

      </div>

      <!-- 学習時間 -->
      <div class="stat-card">

        <i class="fa-regular fa-clock"></i>

        <div>
          <p>学習時間</p>
          <h2 id="stat-study-time">18時間</h2>
        </div>

      </div>

      <!-- 学習日数 -->
      <div class="stat-card">

        <i class="fa-regular fa-calendar"></i>

        <div>
          <p>学習日数</p>
          <h2 id="stat-study-days">12日</h2>
        </div>

      </div>

    </section>

    <!-- 下部 -->
    <section class="bottom-grid">

      <div class="history-column">
        <section class="history-practice-card" aria-label="復習メニュー">
          <div class="history-practice-block">
            <div class="history-practice-title">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <span>直近解いていない問題</span>
            </div>

            <div class="history-practice-actions">
              <div class="top-period-tabs" role="group" aria-label="未回答とみなす期間">
                <button type="button" class="top-period-tab" data-period-days="1">1日</button>
                <button type="button" class="top-period-tab" data-period-days="3">3日</button>
                <button type="button" class="top-period-tab active" data-period-days="7">7日</button>
                <button type="button" class="top-period-tab" data-period-days="14">2週間</button>
                <button type="button" class="top-period-tab" data-period-days="30">1か月</button>
                <button type="button" class="top-period-tab" data-period-days="90">3か月</button>
                <button type="button" class="top-period-tab" data-period-days="all">全期間</button>
                <button type="button" class="top-period-tab" data-period-days="custom">指定期間</button>

                <label id="top-custom-period-field" class="custom-period-field" for="top-custom-period-days">
                  <input id="top-custom-period-days" type="number" min="1" step="1" value="7" disabled />
                  <span>日</span>
                </label>
              </div>

              <button id="top-start-unanswered-btn" type="button" class="history-practice-btn">
                未回答問題を解く
              </button>
            </div>
          </div>

          <div class="history-practice-block history-practice-block-inline">
            <div class="history-practice-title">
              <i class="fa-solid fa-rotate-right"></i>
              <span>間違えた問題</span>
            </div>

            <div class="incorrect-practice-actions">
              <button id="top-start-recent-incorrect-btn" type="button" class="history-practice-btn history-practice-btn-secondary">
                直近で間違えた問題
              </button>

              <button id="top-start-incorrect-btn" type="button" class="history-practice-btn history-practice-btn-secondary">
                過去に間違えた問題
              </button>
            </div>
          </div>
        </section>

        <!-- 履歴 -->
        <div class="history-card">

          <div class="section-heading">

            <h2>
              最近の学習履歴
            </h2>

            <button type="button" class="history-more-btn">
              すべて見る
            </button>

          </div>

          <ul>

            <li>EC2 インスタンスの基本</li>
            <li>IAM ユーザーとグループ</li>
            <li>S3 ストレージの仕組み</li>

          </ul>

        </div>
      </div>

      <!-- 苦手 -->
      <div class="weak-card">

        <h2>
          苦手分野 TOP3
        </h2>

        <div id="weak-list" class="weak-list">
          <button type="button" class="weak-item">
            <span>IAM</span>
            <span>45%</span>
          </button>

          <button type="button" class="weak-item">
            <span>VPC</span>
            <span>55%</span>
          </button>

          <button type="button" class="weak-item">
            <span>セキュリティ</span>
            <span>60%</span>
          </button>
        </div>

        <button id="weak-toggle-btn" type="button" class="weak-more-btn" aria-controls="weak-list" hidden>
          もっと見る
        </button>

      </div>

    </section>

    <section class="debug-log-card">

      <div class="section-heading">

        <h2>
          集計ログ
        </h2>

        <span id="debug-log-summary">読み込み中</span>

      </div>

      <div id="debug-log-list" class="debug-log-list">
        <p>集計ログを読み込んでいます。</p>
      </div>

    </section>

    </main>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 設定を読み込んでからJSを実行 -->
  <script>
    fetch('supabase-config.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('supabase-config.jsonが見つかりません');
        }
        return response.json();
      })
      .then(config => {
        window.SUPABASE_CONFIG = config.supabase;
        // 設定完了後に index.js を読み込む
        const script = document.createElement('script');
        script.src = 'index.js';
        document.body.appendChild(script);
      })
      .catch(error => {
        console.error('Supabase設定エラー:', error);
        // 例外の場合でも index.js を読み込む
        const script = document.createElement('script');
        script.src = 'index.js';
        document.body.appendChild(script);
      });
  </script>

</body>

</html>
