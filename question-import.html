<!DOCTYPE html>
<html lang="ja">

<head>

  <!-- 文字コード -->
  <meta charset="UTF-8">

  <!-- レスポンシブ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- タイトル -->
  <title>問題登録 | QualiStudy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="question-import.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SzlrxWriC3z/6kXrCS3K0cv1rfHkXlw6xPG2wP1r5JCm1TK5vLZtKwkmK6U9I0YF2D6fU5agM8+4M4w9kUdhYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

  <!-- ========================= -->
  <!-- サイドバー -->
  <!-- ========================= -->

  <aside class="sidebar">

    <div class="logo">

      <i class="fa-solid fa-graduation-cap"></i>

      <span>QualiStudy</span>

    </div>

    <div class="selected-exam">

      <p class="label">
        登録対象資格
      </p>

      <h2 id="exam-name">
        AWS CCP
      </h2>

    </div>

  </aside>

  <!-- ========================= -->
  <!-- メイン -->
  <!-- ========================= -->

  <main class="main-content">

    <!-- タイトル -->
    <section class="page-header">

      <h1>
        問題インポート
      </h1>

      <p>
        Excelファイルから問題を一括登録します
      </p>

    </section>

    <!-- インポートカード -->
    <section class="import-card">

      <!-- Excel形式 -->
      <div class="format-box">

        <h2>
          Excel形式
        </h2>

<pre>
category | question | choices | answers

EC2 | EC2とは？ | DB,仮想サーバ,CDN | 2
IAM | IAMの機能は？ | 認証,認可,CDN,監視 | 1,2
</pre>

      </div>

      <!-- アップロード -->
      <div class="upload-area">

        <i class="fa-solid fa-file-excel excel-icon"></i>

        <h2>
          Excelファイルを選択
        </h2>

        <p>
          .xlsx / .xls 対応
        </p>

        <!-- ファイル入力 -->
        <input
          type="file"
          id="excel-file"
          accept=".xlsx,.xls">

        <!-- ボタン -->
        <button id="import-btn">

          <i class="fa-solid fa-upload"></i>

          インポート開始

        </button>

      </div>

    </section>

    <!-- 確認画面 -->
    <section class="confirm-card" id="confirm-card" style="display: none;">

      <h2>
        インポート確認
      </h2>

      <p>
        以下の問題を登録します。確認してください。
      </p>

      <div id="confirm-list">
        <!-- 問題一覧がここに表示される -->
      </div>

      <div class="confirm-buttons">
        <button id="confirm-ok-btn">
          <i class="fa-solid fa-check"></i>
          登録する
        </button>
        <button id="confirm-cancel-btn">
          <i class="fa-solid fa-times"></i>
          キャンセル
        </button>
      </div>

    </section>

    <!-- ログ -->
    <section class="log-card">

      <h2>
        インポートログ
      </h2>

      <div id="log-area">

        <p>
          まだインポートされていません
        </p>

      </div>

    </section>

  </main>

  <!-- SheetJS (最初に読み込む) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 設定を読み込んでからJSを実行 -->
  <script>
    fetch('supabase-config.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('supabase-config.jsonが見つかりません');
        }
        return response.json();
      })
      .then(config => {
        window.SUPABASE_CONFIG = config.supabase;
        // 設定完了後に question-import.js を読み込む
        const script = document.createElement('script');
        script.src = 'question-import.js';
        document.body.appendChild(script);
      })
      .catch(error => {
        console.error('設定ファイル読み込みエラー:', error);
        alert('Supabase設定ファイルが見つかりません');
      });
  </script>

</body>

</html>
